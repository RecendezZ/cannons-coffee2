<body>
    <header>



        <nav>

            <div class="logo"><img src="images/logo-nav.png" alt="Cannons Coffee Logo, Beans of Joy" />

                <h1>CANNON'S COFFEE</h1>
            </div>

            <ul>
                <li><a href="index.html" target="_blank">HOME</a></li>
                <li><a href="latte.html" target="_blank">COFFEE</a></li>
                <li><a href="https://locations.noahs.com/us/ca/oakland/5095-telegraph-ave" target="_blank">ABOUT</a>

            </ul>
        </nav>





    </header>
    <main>
        <form id="cannonsCoffeeForm">




            <h1>Have Questions?</h1>
            <p>Our customer support team at Cannons Coffee loves to help our customers!!! Fill out the form below and we
                will gladly get back to you with in 1 business day</p>
            <div>
                <label for="name">Name:</label><br><br>
                <input type="text" id="name" name="name" placeholder="Your Name Here">
            </div>

            <div>
                <label for="email">Enter your email:</label>
                <input type="email" id="email" name="email" placeholder="Your Email Here" />
            </div>
            <div>
                <label for="phone">Phone Number:</label><br><br>
                <input type="tel" id="phone" name="phone" placeholder="Phone Number" />
            </div>

            <div>
                <label for="comments">Comments Here:</label>
                <textarea id="comments" name="comments" placeholder="Tell us how you feel"></textarea>
            </div>


            <div>
                <label for="style">My favorite drink:</label>
                <select id="style" name="style">
                    <option value="">--Please choose an option--</option>
                    <option value="hotCoffee">Hot Coffee</option>
                    <option value="frap">Frappuccino</option>
                    <option value="hotChocolate">Hot Chocolate</option>
                </select>
            </div>
            <div>
                <p>Please choose one:</p>
                <input type="radio" id="buying" name="interest" value="buyingCoffee">
                <label for="buying">Purchasing Coffee</label>
                <input type="radio" id="employment" name="interest" value="employment">
                <label for="employment">Seeking Employment</label>
            </div>
            <div>
                <button type="submit">Submit</button>
            </div>
        </form>
    </main>

    <script src="js/custom-inquiry.js"></script>
</body>

</html>
